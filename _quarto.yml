execute:
  echo: false
  warning: false
  message: false

format:
  html:
    include-in-header:
      text: |
        <style>
        #quarto-sidebar {
          position: fixed !important;
          /* Keeps the sidebar below the navbar */
          top: 70px !important;       
          height: calc(100vh - 70px) !important;
          
          /* Border removed: The line is now gone */
          border-right: none !important; 
          
          background-color: transparent !important;
          overflow-y: auto !important;
        }

        /* Hide the sidebar's internal scrollbar */
        #quarto-sidebar::-webkit-scrollbar {
          display: none;
        }
        #quarto-sidebar {
          scrollbar-width: none;
        }
        </style>
    page-layout: full
    code-fold: false
    theme: quartz